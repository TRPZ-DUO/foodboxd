services:
  db:
    image: postgres:17-alpine
    container_name: foodboxd-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodboxd
    ports:
      - "5432:5432"
    volumes:
      - foodboxd-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodboxd"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  foodboxd-db-data:
