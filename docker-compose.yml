services:
  db:
    image: postgres:17-alpine
    container_name: foodboxd-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodboxd
    ports:
      - "5432:5432"
    volumes:
      - foodboxd-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodboxd"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: development
    container_name: foodboxd-backend
    restart: unless-stopped
    environment:
      # Dentro da rede do compose o host do banco e `db`, nao localhost.
      # Sobrescreve o DATABASE_URL do backend/.env, que aponta para o host.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/foodboxd?schema=public
      PORT: 3000
      # Bind mount no Windows nao propaga eventos de inotify; sem polling o watch nao dispara.
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      # Volumes anonimos: preservam o que foi instalado/gerado dentro do container,
      # senao o bind mount acima os cobre com as versoes do host (Windows).
      - /app/node_modules
      - /app/src/generated
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start:dev"

  frontend:
    # O projeto React/Vite ainda nao existe (issue separada), entao este servico
    # fica atras de um profile para nao quebrar o `docker compose up` dos demais.
    # Quando o frontend/ for criado, remover a linha de profiles abaixo.
    profiles: ["frontend"]
    build:
      context: ./frontend
      target: development
    container_name: foodboxd-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  foodboxd-db-data:
